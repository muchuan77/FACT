<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态演示 — 舆情卡片异步加载</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; margin: 16px; background: #f7f7f7; }
    #root { max-width: 720px; }
    .opinion-card {
      border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px;
      background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .opinion-card .title { margin: 0 0 8px; font-size: 1.1rem; }
    .opinion-card .content { color: #333; line-height: 1.55; margin: 8px 0; }
    .opinion-card .source { color: #666; font-size: 0.9rem; }
    .opinion-card .publish-time { display: block; color: #888; font-size: 0.85rem; margin-top: 6px; }
    .opinion-card .category { margin-top: 6px; font-size: 0.9rem; color: #0a6; }
    .opinion-card .keywords { margin-top: 8px; }
    .opinion-card .keyword { display: inline-block; background: #eef; padding: 2px 8px; margin: 2px 4px 2px 0; border-radius: 4px; font-size: 0.8rem; }
    .opinion-card a.detail { display: inline-block; margin-top: 10px; }
  </style>
</head>
<body>
  <p id="shell-hint">页面骨架已加载，正文卡片由脚本延迟注入（用于 Scrapy + Playwright 动态采集演示）。</p>
  <div id="root"></div>
  <script>
  (function () {
    function addCard(root, data) {
      var el = document.createElement("div");
      el.className = "opinion-card" + (data.extraClass ? " " + data.extraClass : "");
      el.setAttribute("data-role", "opinion-item");
      el.setAttribute("data-keywords", data.keywords);
      var h2 = document.createElement("h2");
      h2.className = "title";
      h2.textContent = data.title;
      var p = document.createElement("p");
      p.className = "content";
      p.textContent = data.content;
      var src = document.createElement("span");
      src.className = "source";
      src.textContent = data.source;
      var tm = document.createElement("time");
      tm.className = "publish-time";
      tm.textContent = data.publish_time;
      var cat = document.createElement("div");
      cat.className = "category";
      cat.textContent = data.category;
      var kwWrap = document.createElement("div");
      kwWrap.className = "keywords";
      data.keywords.split(",").forEach(function (k) {
        var s = document.createElement("span");
        s.className = "keyword";
        s.textContent = k.trim();
        kwWrap.appendChild(s);
      });
      var a = document.createElement("a");
      a.className = "detail";
      a.href = data.url;
      a.textContent = "原文链接";
      el.appendChild(h2);
      el.appendChild(p);
      el.appendChild(src);
      el.appendChild(tm);
      el.appendChild(cat);
      el.appendChild(kwWrap);
      el.appendChild(a);
      root.appendChild(el);
    }
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(function () {
        var root = document.getElementById("root");
        var hint = document.getElementById("shell-hint");
        if (hint) hint.style.display = "none";
        addCard(root, {
          title: "郑州轻工业大学校园舆情监测演示",
          content: "为加强校园网络舆情引导，学校融媒体中心将定期开展舆情监测与预警演练。本卡片为本地动态渲染演示数据，不代表真实事件。",
          source: "校园演示网",
          publish_time: "2026-05-06 10:00",
          category: "教育舆情",
          keywords: "校园,舆情,监测",
          url: "http://127.0.0.1:8766/demo-item-1.html"
        });
        addCard(root, {
          extraClass: "dynamic-item",
          title: "某地公共安全风险动态信息",
          content: "应急管理部门提示公众关注官方权威发布，不信谣不传谣。本文为动态渲染演示内容，请勿对号入座。",
          source: "公共安全演示",
          publish_time: "2026-05-06 11:30",
          category: "社会热点",
          keywords: "公共安全,风险,动态",
          url: "http://127.0.0.1:8766/demo-item-2.html"
        });
      }, 400);
    });
  })();
  </script>
</body>
</html>
