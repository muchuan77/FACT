    </header>
    <section class="body">
      <p>
        近期受季节性天气与大型活动叠加影响，部分地区人员密集场所安全风险有所上升。
        现发布公共安全风险提示，请公众与相关单位提高警惕、科学防范。
      </p>
      <p>
        建议关注交通运输、人员密集场所、临时搭建物、涉水区域等重点环节；遇极端天气预警，
        应及时调整出行计划，服从现场工作人员引导。
      </p>

      </p>
